<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2332;
    --border: #1e2d42;
    --accent: #e63946;
    --gold: #f4a261;
    --cyan: #06b6d4;
    --green: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #0f172a 50%, #0a0e1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--accent); }

  nav {
    display: flex;
    gap: 0.25rem;
  }

  nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.875rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  nav button:hover { color: var(--text); background: var(--surface); }
  nav button.active { color: var(--text); background: var(--surface2); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
  }

  .section { display: none; }
  .section.active { display: block; }

  .hero-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }

  .stat-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--cyan);
  }

  .stat-sub {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    margin-bottom: 1.25rem;
  }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }

  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .group-header {
    background: var(--surface2);
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
  }

  .group-teams {
    padding: 0.5rem 0;
  }

  .group-team {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid #1a2332;
    font-size: 0.9rem;
  }

  .group-team:last-child { border-bottom: none; }

  .team-flag { font-size: 18px; }
  .team-name { flex: 1; }
  .team-stats {
    display: flex;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.4rem 0.875rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--cyan); color: var(--text); }
  .filter-btn.active { background: var(--cyan); color: var(--bg); }

  .matches-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .match-day-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 1rem 0 0.5rem;
  }

  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    display: grid;
    grid-template-columns: 1.5fr auto 1.5fr 1fr;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.15s;
  }

  .match-card:hover { border-color: var(--cyan); background: var(--surface2); }
  .match-card.played { border-left: 3px solid var(--green); }

  .match-team {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 600;
  }

  .match-team.right { justify-content: flex-end; text-align: right; }

  .match-score {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--gold);
  }

  .match-meta {
    text-align: right;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .match-meta .city { color: var(--cyan); font-weight: 500; }

  .venues-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }

  .venue-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .venue-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--cyan);
    margin-bottom: 0.25rem;
  }

  .venue-country {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .venue-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8rem;
    color: var(--gold);
    font-weight: 600;
  }

  .loading {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top: 2px solid var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .update-info {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2rem;
  }

  @media (max-width: 900px) {
    .groups-grid { grid-template-columns: repeat(2, 1fr); }
    .hero-stats { grid-template-columns: repeat(2, 1fr); }
    .venues-grid { grid-template-columns: repeat(2, 1fr); }
    .match-card { grid-template-columns: 1fr auto 1fr; }
    .match-meta { display: none; }
  }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .groups-grid { grid-template-columns: 1fr; }
    .hero-stats { grid-template-columns: 1fr; }
    .venues-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div style="font-size:24px">⚽</div>
      <h1>WORLD CUP <span>2026</span>v2.2</h1>
    </div>
    <nav>
      <button class="active" onclick="showSection('overview')">Overview</button>
      <button onclick="showSection('groups')">Gironi</button>
      <button onclick="showSection('schedule')">Calendario</button>
      <button onclick="showSection('venues')">Sedi</button>
    </nav>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="update-time">--:--</span>
    </div>
  </div>
</header>

<main>

  <section id="overview" class="section active">
    <div class="hero-stats">
      <div class="stat-card">
        <div class="stat-label">Squadre</div>
        <div class="stat-value">48</div>
        <div class="stat-sub">partecipanti</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Partite</div>
        <div class="stat-value" id="total-matches">36</div>
        <div class="stat-sub">gironi</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Giocate</div>
        <div class="stat-value" id="matches-played">0</div>
        <div class="stat-sub">risultati</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sedi</div>
        <div class="stat-value" id="total-venues">16</div>
        <div class="stat-sub">città</div>
      </div>
    </div>

    <h2 class="section-title">Prossime Partite</h2>
    <div class="matches-list" id="upcoming-matches"><div class="loading"><div class="spinner"></div> Caricamento dati...</div></div>

    <div class="update-info" id="last-update">Dati aggiornati: --:--</div>
  </section>

  <section id="groups" class="section">
    <h2 class="section-title">Gironi</h2>
    <div class="groups-grid" id="groups-grid"><div class="loading"><div class="spinner"></div> Caricamento...</div></div>
  </section>

  <section id="schedule" class="section">
    <h2 class="section-title">Calendario</h2>
    <div class="filters" id="schedule-filters">
      <button class="filter-btn active" onclick="filterMatches('all', this)">Tutte</button>
    </div>
    <div class="matches-list" id="schedule-container"><div class="loading"><div class="spinner"></div> Caricamento...</div></div>
  </section>

  <section id="venues" class="section">
    <h2 class="section-title">Sedi</h2>
    <div class="venues-grid" id="venues-grid"><div class="loading"><div class="spinner"></div> Caricamento...</div></div>
  </section>

</main>

<script>
const FLAGS = {
  'Mexico':'🇲🇽', 'South Africa':'🇿🇦', 'South Korea':'🇰🇷', 'Czech Republic':'🇨🇿',
  'Canada':'🇨🇦', 'Bosnia & Herzegovina':'🇧🇦', 'Qatar':'🇶🇦', 'Switzerland':'🇨🇭',
  'Brazil':'🇧🇷', 'Morocco':'🇲🇦', 'Haiti':'🇭🇹', 'Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'USA':'🇺🇸', 'Paraguay':'🇵🇾', 'Australia':'🇦🇺', 'Turkey':'🇹🇷',
  'Germany':'🇩🇪', 'Curaçao':'🇨🇼', 'Ivory Coast':'🇨🇮', 'Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱', 'Japan':'🇯🇵', 'Sweden':'🇸🇪', 'Tunisia':'🇹🇳',
  'Belgium':'🇧🇪', 'Egypt':'🇪🇬', 'Iran':'🇮🇷', 'New Zealand':'🇳🇿',
  'Spain':'🇪🇸', 'Cape Verde':'🇨🇻', 'Saudi Arabia':'🇸🇦', 'Uruguay':'🇺🇾',
  'France':'🇫🇷', 'Senegal':'🇸🇳', 'Iraq':'🇮🇶', 'Norway':'🇳🇴',
  'Argentina':'🇦🇷', 'Algeria':'🇩🇿', 'Austria':'🇦🇹', 'Jordan':'🇯🇴',
  'Portugal':'🇵🇹', 'DR Congo':'🇨🇩', 'Uzbekistan':'🇺🇿', 'Colombia':'🇨🇴',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Croatia':'🇭🇷', 'Ghana':'🇬🇭', 'Panama':'🇵🇦'
};

const GROUPS = {
  A: ['Mexico', 'South Africa', 'South Korea', 'Czech Republic'],
  B: ['Canada', 'Bosnia & Herzegovina', 'Qatar', 'Switzerland'],
  C: ['Brazil', 'Morocco', 'Haiti', 'Scotland'],
  D: ['USA', 'Paraguay', 'Australia', 'Turkey'],
  E: ['Germany', 'Curaçao', 'Ivory Coast', 'Ecuador'],
  F: ['Netherlands', 'Japan', 'Sweden', 'Tunisia'],
  G: ['Belgium', 'Egypt', 'Iran', 'New Zealand'],
  H: ['Spain', 'Cape Verde', 'Saudi Arabia', 'Uruguay'],
  I: ['France', 'Senegal', 'Iraq', 'Norway'],
  J: ['Argentina', 'Algeria', 'Austria', 'Jordan'],
  K: ['Portugal', 'DR Congo', 'Uzbekistan', 'Colombia'],
  L: ['England', 'Croatia', 'Ghana', 'Panama']
};

let matches = [];
let standings = {};

function flag(team) { return FLAGS[team] || '🏳️'; }

function getGroup(team) {
  for (const [g, teams] of Object.entries(GROUPS)) {
    if (teams.includes(team)) return g;
  }
  return null;
}

function getVenueLocation(stadium) {
  const usa = ['New York', 'Los Angeles', 'Dallas', 'Houston', 'San Francisco', 'Seattle', 'Kansas City', 'Miami', 'Boston', 'Philadelphia', 'Atlanta', 'Arlington', 'Inglewood', 'Foxborough'];
  const can = ['Toronto', 'Vancouver'];
  const mex = ['Mexico City', 'Guadalajara', 'Monterrey', 'Zapopan', 'Guadalupe'];
  
  for (const c of usa) if (stadium.includes(c)) return '🇺🇸 USA';
  for (const c of can) if (stadium.includes(c)) return '🇨🇦 Canada';
  for (const c of mex) if (stadium.includes(c)) return '🇲🇽 Mexico';
  return '🌎';
}

async function loadData() {
  try {
    const response = await fetch('https://raw.githubusercontent.com/openfootball/worldcup/refs/heads/master/2026--usa/cup.txt');
    const text = await response.text();
    
    matches = [];
    let currentGroup = null;
    const lines = text.split('\n');
    
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i].trim();
      
      // Detect group
      if (line.match(/^▪\s*Group\s+([A-L])$/)) {
        currentGroup = line.match(/([A-L])/)[1];
        continue;
      }
      
      // Match pattern: "Thu June 11" or similar
      const dateMatch = line.match(/^([A-Za-z]+)\s+([A-Za-z]+)\s+(\d{1,2})$/);
      if (dateMatch && currentGroup) {
        const [, dow, monthStr, day] = dateMatch;
        const month = monthStr.toLowerCase();
        
        // Look for matches on the next line(s)
        for (let j = i + 1; j < lines.length; j++) {
          const nextLine = lines[j].trim();
          if (!nextLine || nextLine.match(/^▪/) || nextLine.match(/^[A-Za-z]+\s+[A-Za-z]+\s+\d{1,2}$/)) break;
          
          // Match pattern: "13:00 UTC-6     Mexico  v South Africa  @ Mexico City"
          const matchPattern = /^(\d{2}):(\d{2})\s+[^M]*?([^v@]+?)\s+v\s+([^@]+?)\s+@\s+(.+?)$/;
          const m = nextLine.match(matchPattern);
          
          if (m) {
            const [, hour, min, home, away, stadium] = m;
            const homeTeam = home.trim();
            const awayTeam = away.trim();
            
            if (getGroup(homeTeam) === currentGroup && getGroup(awayTeam) === currentGroup) {
              matches.push({
                group: currentGroup,
                dayOfWeek: dow,
                month,
                day: parseInt(day),
                time: `${hour}:${min}`,
                home: homeTeam,
                away: awayTeam,
                stadium: stadium.trim(),
                score: null,
                homeGoals: null,
                awayGoals: null,
                ht: null
              });
            }
          }
        }
      }
    }
    
    document.getElementById('total-matches').textContent = matches.length;
    document.getElementById('matches-played').textContent = matches.filter(m => m.score).length;
    
    const now = new Date();
    document.getElementById('update-time').textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    
    renderAll();
  } catch (err) {
    console.error('Error:', err);
    document.getElementById('upcoming-matches').innerHTML = '<div class="loading">❌ Errore caricamento dati</div>';
  }
}

function renderOverview() {
  const container = document.getElementById('upcoming-matches');
  container.innerHTML = '';
  
  const today = new Date();
  const upcoming = matches.filter(m => !m.score).slice(0, 8);
  
  if (upcoming.length === 0) {
    container.innerHTML = '<div class="loading">✓ Calendario completato!</div>';
    return;
  }
  
  let lastDate = null;
  upcoming.forEach(m => {
    const dateStr = `${m.dayOfWeek} ${m.month} ${m.day}`;
    if (dateStr !== lastDate) {
      const header = document.createElement('div');
      header.className = 'match-day-header';
      header.textContent = dateStr;
      container.appendChild(header);
      lastDate = dateStr;
    }
    container.appendChild(createMatchCard(m));
  });
}

function renderGroups() {
  const grid = document.getElementById('groups-grid');
  grid.innerHTML = '';
  
  Object.entries(GROUPS).forEach(([letter, teams]) => {
    const card = document.createElement('div');
    card.className = 'group-card';
    const teamsHtml = teams.map(t => `
      <div class="group-team">
        <span class="team-flag">${flag(t)}</span>
        <span class="team-name">${t}</span>
      </div>`).join('');
    
    card.innerHTML = `
      <div class="group-header">Girone ${letter}</div>
      <div class="group-teams">${teamsHtml}</div>`;
    grid.appendChild(card);
  });
}

function renderSchedule(group = 'all') {
  const container = document.getElementById('schedule-container');
  container.innerHTML = '';
  
  let filtered = matches;
  if (group !== 'all') {
    filtered = matches.filter(m => m.group === group);
  }
  
  filtered.sort((a, b) => {
    const da = new Date(2026, monthToNum(a.month) - 1, a.day);
    const db = new Date(2026, monthToNum(b.month) - 1, b.day);
    return da - db;
  });
  
  let lastDate = null;
  filtered.forEach(m => {
    const dateStr = `${m.dayOfWeek} ${m.month} ${m.day}`;
    if (dateStr !== lastDate) {
      const header = document.createElement('div');
      header.className = 'match-day-header';
      header.textContent = dateStr;
      container.appendChild(header);
      lastDate = dateStr;
    }
    container.appendChild(createMatchCard(m));
  });
  
  // Add filters
  const filterContainer = document.getElementById('schedule-filters');
  if (filterContainer.children.length === 1) {
    Object.keys(GROUPS).forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = `Girone ${g}`;
      btn.onclick = () => filterMatches(g, btn);
      filterContainer.appendChild(btn);
    });
  }
}

function filterMatches(group, btn) {
  document.querySelectorAll('#schedule-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchedule(group);
}

function renderVenues() {
  const venues = {};
  matches.forEach(m => {
    if (!venues[m.stadium]) {
      venues[m.stadium] = { count: 0, location: getVenueLocation(m.stadium) };
    }
    venues[m.stadium].count++;
  });
  
  const grid = document.getElementById('venues-grid');
  grid.innerHTML = '';
  
  Object.entries(venues)
    .sort((a, b) => b[1].count - a[1].count)
    .forEach(([stadium, data]) => {
      const card = document.createElement('div');
      card.className = 'venue-card';
      card.innerHTML = `
        <div class="venue-name">${stadium}</div>
        <div class="venue-country">${data.location}</div>
        <div class="venue-count">${data.count}</div>`;
      grid.appendChild(card);
    });
  
  document.getElementById('total-venues').textContent = Object.keys(venues).length;
}

function createMatchCard(m) {
  const card = document.createElement('div');
  card.className = 'match-card' + (m.score ? ' played' : '');
  
  const scoreDisplay = m.score ? `<strong>${m.homeGoals}-${m.awayGoals}</strong><small>${m.ht ? ` (${m.ht})` : ''}</small>` : 'vs';
  
  card.innerHTML = `
    <div class="match-team">
      <span class="team-flag">${flag(m.home)}</span>
      <span>${m.home}</span>
    </div>
    <div class="match-score">${scoreDisplay}</div>
    <div class="match-team right">
      <span>${m.away}</span>
      <span class="team-flag">${flag(m.away)}</span>
    </div>
    <div class="match-meta">
      <div class="city">${m.stadium}</div>
      <div>${m.time}</div>
    </div>`;
  
  return card;
}

function monthToNum(month) {
  const map = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
  return map[month.toLowerCase().substring(0, 3)] || 0;
}

function renderAll() {
  renderOverview();
  renderGroups();
  renderSchedule();
  renderVenues();
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['overview', 'groups', 'schedule', 'venues'][i] === id);
  });
}

// Init
loadData();
setInterval(loadData, 5 * 60 * 1000); // Refresh every 5 minutes
</script>
</body>
</html>
